<html lang="en">
<head>

<title>CPP Learn — Interactive C++ Course</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }

:root {
  --bg-primary: #1a1d23;
  --bg-secondary: #21252b;
  --bg-tertiary: #282c34;
  --bg-surface: #2c313a;
  --bg-hover: #353b45;
  --bg-active: #3a4050;
  --border: #3a3f4b;
  --border-light: #4a4f5b;
  --text-primary: #e8eaed;
  --text-secondary: #b0b5c0;
  --text-muted: #7a7f8a;
  --accent: #4fc3f7;
  --accent-dim: #2b7fa0;
  --success: #66bb6a;
  --error: #ef5350;
  --code-bg: #1e1e1e;
  --sidebar-width: 260px;
  --topbar-height: 52px;
  --radius: 8px;
  --radius-sm: 4px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ─── focus ─── */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* ─── top bar ─── */
.topbar {
  height: var(--topbar-height);
  background: #15171b;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}
.topbar-logo {
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: -0.02em;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}
.topbar-logo svg { display: block; }
.topbar-breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-left: 8px;
}
.topbar-breadcrumb span { color: var(--text-secondary); }
.topbar-spacer { flex: 1; }
.topbar-profile {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-hover);
  border: 1px solid var(--border-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);
  cursor: default;
}

/* ─── layout ─── */
.app-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── sidebar ─── */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px 0;
}
.sidebar-heading {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 8px 20px 12px;
}
.lesson-nav { list-style: none; }
.lesson-nav li { margin: 0; }
.lesson-nav button {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  padding: 10px 20px;
  background: none;
  border: none;
  border-left: 3px solid transparent;
  color: var(--text-secondary);
  font-size: 0.88rem;
  font-family: var(--font-sans);
  text-align: left;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.lesson-nav button:hover { background: var(--bg-hover); color: var(--text-primary); }
.lesson-nav button:focus-visible { outline-offset: -2px; }
.lesson-nav button[aria-current="page"] {
  background: var(--bg-active);
  border-left-color: var(--accent);
  color: var(--text-primary);
  font-weight: 600;
}
.lesson-num {
  flex-shrink: 0;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--bg-surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 600;
  color: var(--text-muted);
  transition: background 0.15s, color 0.15s;
}
.lesson-nav button[aria-current="page"] .lesson-num {
  background: var(--accent-dim);
  color: #fff;
}
.lesson-nav button:hover .lesson-num { background: var(--bg-hover); color: var(--text-secondary); }

/* ─── main content ─── */
.main-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
  min-width: 0;
}

/* ─── lesson reader ─── */
.reader-panel {
  overflow-y: auto;
  padding: 32px 36px;
  border-right: 1px solid var(--border);
}
.reader-panel h2 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--text-primary);
}
.reader-panel .lesson-meta {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}
.reader-panel h3 {
  font-size: 1.1rem;
  font-weight: 600;
  margin: 24px 0 10px;
  color: var(--text-primary);
}
.reader-panel p {
  line-height: 1.65;
  margin-bottom: 14px;
  color: var(--text-secondary);
}
.reader-panel pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  overflow-x: auto;
  margin: 16px 0;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.55;
  color: #d4d4d4;
}
.reader-panel code {
  font-family: var(--font-mono);
  font-size: 0.82rem;
}
.reader-panel p code {
  background: var(--bg-surface);
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  color: #ce91d8;
}
.reader-panel ul {
  margin: 10px 0 14px 22px;
  color: var(--text-secondary);
  line-height: 1.65;
}
.reader-panel li { margin-bottom: 4px; }
.reader-panel .keyword  { color: #569cd6; }
.reader-panel .type     { color: #4ec9b0; }
.reader-panel .string   { color: #ce9178; }
.reader-panel .comment  { color: #6a9955; font-style: italic; }
.reader-panel .number   { color: #b5cea8; }
.reader-panel .function { color: #dcdcaa; }
.reader-panel .preproc  { color: #c586c0; }

/* ─── editor panel ─── */
.editor-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.editor-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;

.editor-toolbar label {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.04em;

.editor-toolbar-actions { display: flex; gap: 8px; }
.btn {

  font-size: 0.82rem;
  font-weight: 600;
  padding: 7px 18px;

  cursor: pointer;

.btn-primary:hover { background: #6fd0fa; }
.btn-primary:focus-visible { outline-color: var(--accent); }
.btn-secondary {
  background: var(--bg-surface);
  color: var(--text-secondary);
  border: 1px solid var(--border-light);

.btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

.editor-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.editor-wrapper textarea {
  width: 100%;
  height: 100%;
  padding: 20px;
  background: var(--code-bg);
  color: #d4d4d4;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  line-height: 1.6;
  border: none;
  resize: none;
  outline: none;
  tab-size: 2;
  white-space: pre;
  overflow-wrap: normal;
  overflow-x: auto;
}
.editor-wrapper textarea::placeholder { color: var(--text-muted); }

.status-bar {
  flex-shrink: 0;
  padding: 10px 20px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  font-size: 0.82rem;
  min-height: 42px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color 0.2s;
}
.status-bar[data-status="success"] { color: var(--success); }
.status-bar[data-status="error"] { color: var(--error); }
.status-bar[data-status="info"] { color: var(--text-muted); }
.status-bar svg { flex-shrink: 0; }

/* ─── toggle sidebar (tablet) ─── */
.sidebar-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 4px;
  border-radius: var(--radius-sm);
}
.sidebar-toggle:hover { color: var(--text-primary); }

/* ─── responsive ─── */
@media (max-width: 1024px) {
  .sidebar {
    width: 220px;
  }
  .reader-panel { padding: 24px; }
}

@media (max-width: 768px) {
  .sidebar-toggle { display: block; }
  .app-layout { flex-direction: column; }
  .sidebar {
    width: 100%;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .sidebar.open { max-height: 400px; overflow-y: auto; }
  .sidebar-heading { padding: 8px 16px 10px; }
  .lesson-nav button { padding: 8px 16px; }

  .main-content {
    grid-template-columns: 1fr;
    overflow: visible;
  }
  .reader-panel {
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 20px;
    max-height: 50vh;
  }
  .editor-panel { min-height: 40vh; }
  .topbar { gap: 10px; padding: 0 12px; }
  .topbar-breadcrumb { display: none; }
}
</style>

    title: "Introduction to Modern C++",
    content: `## What is Modern C++?

Modern C++ (C++11 and later) brings cleaner syntax, safer memory management, and powerful features. This course uses **C++17/20** throughout.

### Your First Program

Every C++ program starts with a ` + "`main()`" + ` function. Modern C++ prefers **type deduction** with \`auto\` and avoids \`endl\` in favor of \`\\n\`:

\`\`\`cpp
#include <iostream>
using namespace std;

auto main() -> int {
    cout << "Hello, World!\\n";
}
\`\`\`

### How It Works

- <code class="keyword">#include &lt;iostream&gt;</code> — input/output library
- <code class="keyword">using namespace std;</code> — lets you write <code class="keyword">cout</code> instead of <code class="keyword">std::cout</code>
- <code class="keyword">auto main() -> int</code> — trailing return type (C++11)
- <code class="keyword">cout</code> — prints text; prefer <code class="keyword">\\n</code> over <code class="keyword">endl</code>
- <code class="keyword">return 0;</code> is **optional** in <code class="keyword">main()</code> — it returns 0 by default

> 💡 **Try it:** Change the string to print your own message, then click **Check Answer**.`,

    starterCode: `#include <iostream>\nusing namespace std;\n\nauto main() -> int {\n    cout << "Hello, Modern C++!\\n";\n}`
  },
  {
    id: 2,
    title: "Auto & Uniform Initialization",
    content: `## Type Deduction & Modern Init

Modern C++ uses \`auto\` to deduce types and brace initialization \`{}\` for safety.

### Auto

\`\`\`cpp
auto year = 2026;         // int
auto price = 19.99;       // double
auto name = "Modern"s;    // string (s suffix)
\`\`\`

### Uniform Initialization

\`\`\`cpp
int a{42};                     // direct
auto b = double{3.14};         // deduced from braced init
auto c = string{"Hi"};
\`\`\`

### constexpr — Compile-Time Constants

\`\`\`cpp
constexpr auto gravity = 9.81;    // evaluated at compile time
\`\`\`

### Example

\`\`\`cpp
#include <iostream>
#include <string>
using namespace std;

auto main() -> int {
    constexpr auto year = 2026;
    auto product = "Widget"s;
    auto price = 19.99;

    cout << product << " costs $" << price
              << " (" << year << ")\\n";
}
\`\`\``,
    starterCode: `#include <iostream>\n#include <string>\nusing namespace std;\n\nauto main() -> int {\n    auto name = "Learner"s;\n    auto age = 20;\n    cout << "My name is " << name << " and I am " << age << " years old.\\n";\n}`
  },

    id: 3,
    title: "Input & Output",
    content: `## Console I/O in Modern C++

C++ uses **streams** for I/O. For strings, prefer \`getline\` over \`>>\`:

\`\`\`cpp
#include <iostream>
#include <string>
using namespace std;

auto main() -> int {
    auto line = string{};
    cout << "Enter your name: ";
    getline(cin, line);
    cout << "Hello, " << line << "!\\n";
}
\`\`\`

### Why getline?

\`cin >> name\` stops at whitespace. \`getline\` reads the entire line.

### Chaining

\`\`\`cpp
auto x = 0, y = 0;
cin >> x >> y;              // chain input
cout << x << " + " << y << " = " << x + y << "\\n";
\`\`\`

> **Practice:** Ask for the user's full name and age, then print a greeting.`,

    id: 4,
    title: "Conditionals & constexpr if",
    content: `## Making Decisions

### Modern If/Else

\`\`\`cpp
if (condition) {
    // runs if true
} else if (other) {
    // runs if first false and other true
} else {
    // runs if all false
}
\`\`\`

### constexpr if (C++17)

Evaluated at **compile time** — dead branches are discarded:

\`\`\`cpp
if constexpr (is_integral_v<T>) {
    // only compiled for integral types
}
\`\`\`

### Attributes (C++17)

\`\`\`cpp
if (score >= 90) [[likely]] {
    cout << "Excellent!\\n";
}
\`\`\`

### Comparison & Logical Ops

\`==\` \`!=\` \`<\` \`>\` \`<=\` \`>=\` \`&&\` \`||\` \`!\`

### Example

\`\`\`cpp
#include <iostream>
using namespace std;

auto main() -> int {
    constexpr auto score = 85;

    if (score >= 90) [[likely]] {
        cout << "Grade: A\\n";
    } else if (score >= 80) {
        cout << "Grade: B\\n";
    } else {
        cout << "Grade: C or lower\\n";
    }
}
\`\`\``,
    starterCode: `#include <iostream>\nusing namespace std;\n\nauto main() -> int {\n    constexpr auto temperature = 30;\n\n    if (temperature > 25) {\n        cout << "It's hot outside!\\n";\n    } else if (temperature > 15) {\n        cout << "It's warm outside.\\n";\n    } else {\n        cout << "It's cold outside.\\n";\n    }\n}`

    id: 5,
    title: "Loops & Range-For",
    content: `## Modern Loops

### Range-Based For (C++11)

Iterate over containers cleanly:

\`\`\`cpp
#include <vector>
using namespace std;

auto main() -> int {
    auto nums = vector{10, 20, 30, 40, 50};

    for (const auto& n : nums) {
        cout << n << " ";
    }
    // Output: 10 20 30 40 50
}
\`\`\`

### Traditional For

\`\`\`cpp
for (auto i = 0; i < 5; ++i) {
    cout << i << " ";
}
\`\`\`

### While

\`\`\`cpp
auto count = 0;
while (count < 3) {
    cout << count << " ";
    ++count;
}
\`\`\`

### Do-While

Runs **at least once**:

\`\`\`cpp
auto x = 10;
do {
    cout << x << "\\n";
} while (--x > 0);
\`\`\``,

### Trailing Return & Auto

\`\`\`cpp
auto add(int a, int b) -> int {   // C++11 trailing return
    return a + b;
}

auto multiply(int a, int b) {      // C++14 deduced return
    return a * b;
}
\`\`\`

### constexpr Functions

\`\`\`cpp
constexpr auto square(int x) -> int { return x * x; }
// evaluated at compile time if inputs are constexpr
\`\`\`

### [[nodiscard]] (C++17)

Warns if the return value is ignored:

\`\`\`cpp
[[nodiscard]] auto important() -> bool;
\`\`\`

### Overloading

Multiple functions with the same name, different parameters.

### Example

\`\`\`cpp
#include <iostream>
using namespace std;

[[nodiscard]] auto add(int a, int b) -> int {
    return a + b;
}

auto main() -> int {
    constexpr auto x = 10, y = 5;
    auto sum = add(x, y);
    cout << "Sum: " << sum << "\\n";
}
\`\`\``,

    title: "Containers & Strings",
    content: `## Modern Collections

### array (C++11)

Fixed-size, stack-allocated, knows its size:

\`\`\`cpp
#include <array>
using namespace std;

auto main() -> int {
    auto nums = array{10, 20, 30, 40, 50};
    cout << nums[2];                 // 30
    cout << nums.size();             // 5
    for (const auto& n : nums) { /* ... */ }
}
\`\`\`

### vector

Dynamic, heap-allocated:

\`\`\`cpp
auto vec = vector{1, 2, 3};
vec.push_back(4);
\`\`\`

### string_view (C++17)

Non-owning string reference:

\`\`\`cpp
#include <string_view>
using namespace std;

auto greet(string_view name) -> void {
    cout << "Hello " << name << "\\n";
}
\`\`\`

### Common String Methods

| Method          | Description                  |
|-----------------|------------------------------|
| \`.length()\`     | Returns length               |
| \`.substr(pos)\`  | Extracts substring           |
| \`.find(str)\`    | Finds substring              |
| \`.starts_with()\`| C++20 prefix check           |`,

  },

    title: "Classes & Default Members",
    content: `## Modern Classes

### Default Member Initializers (C++11)

No need for constructor boilerplate:

\`\`\`cpp
class Rectangle {
public:
    double width  = 1.0;
    double height = 1.0;

    auto area() const -> double {
        return width * height;
    }
};
\`\`\`

### Constructors

\`\`\`cpp
class Rectangle {
public:

// ─── helpers ──────────────────────────────────────────────────

function highlightCode(code) {
  const escapes = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'};
  let s = code.replace(/[&<>"]/g, c => escapes[c]);
  const rules = [
    [/\/\/.*$/gm, '<span class="comment">$&</span>'],
    [/#\w+\b/g, '<span class="preproc">$&</span>'],
    [/\b(auto|break|case|catch|class|const|continue|default|delete|do|else|enum|explicit|export|extern|false|final|for|friend|goto|if|include|inline|mutable|namespace|new|nullptr|operator|override|private|protected|public|register|return|sizeof|static|struct|switch|template|this|throw|true|try|typedef|typeid|typename|union|using|virtual|void|volatile|while)\b/g, '<span class="keyword">$&</span>'],
    [/\b(int|bool|char|double|float|long|short|signed|unsigned|string|size_t|void)\b/g, '<span class="type">$&</span>'],
    [/"([^"\\]|\\.)*"/g, '<span class="string">$&</span>'],
    [/'([^'\\]|\\.)'/g, '<span class="string">$&</span>'],
    [/\b(\d+\.?\d*)\b/g, '<span class="number">$&</span>'],
    [/\b([a-zA-Z_]\w*)\s*\(/g, '<span class="function">$1</span>(']
  ];
  for (const [re, repl] of rules) { s = s.replace(re, repl); }
  return s;
}

function renderMarkdown(text) {
  // headings
  let html = text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>');

  // code blocks
  html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
    return '<pre>' + highlightCode(code.trimEnd()) + '</pre>';
  });

  // inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // bold / italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // blockquote
  html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');

  // unordered list
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // tables (basic)
  html = html.replace(/\|(.+)\|[\s\S]*?\|(.+)\|/g, (match) => {
    const rows = match.trim().split('\n');
    const header = rows[0].split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    let body = '';
    for (let i = 2; i < rows.length; i++) {
      const cells = rows[i].split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      if (cells) body += `<tr>${cells}</tr>`;
    }
    return `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
  });

  // paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<\/p><p><h([23])>/g, '<h$1>');
  html = html.replace(/<\/h([23])><p>/g, '</h$1>');
  html = html.replace(/<p><ul>/g, '<ul>');
  html = html.replace(/<\/ul><p>/g, '</ul>');
  html = html.replace(/<p><blockquote>/g, '<blockquote>');
  html = html.replace(/<\/blockquote><p>/g, '</blockquote>');
  html = html.replace(/<p><table>/g, '<table>');
  html = html.replace(/<\/table><p>/g, '</table>');

  // clean <p> around block elements
  html = html.replace(/<p>\s*<\/p>/g, '');

  return html;
}

// ─── state ────────────────────────────────────────────────────
let currentLesson = 0;

const lessonNav  = document.getElementById('lessonNav');
const readerTitle = document.getElementById('readerTitle');
const readerMeta  = document.getElementById('readerMeta');
const readerBody  = document.getElementById('readerBody');
const codeEditor  = document.getElementById('codeEditor');
const statusBar   = document.getElementById('statusBar');
const statusText  = document.getElementById('statusText');
const checkBtn    = document.getElementById('checkBtn');
const breadcrumbLesson = document.getElementById('breadcrumbLesson');

function buildSidebar() {
  lessons.forEach((l, i) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.setAttribute('data-index', i);
    btn.innerHTML = `<span class="lesson-num">${l.id}</span> ${l.title}`;
    btn.addEventListener('click', () => loadLesson(i));
    li.appendChild(btn);
    lessonNav.appendChild(li);
  });
}

function loadLesson(index) {
  currentLesson = index;
  const lesson = lessons[index];

  // reader
  readerTitle.textContent = lesson.title;
  readerMeta.textContent = `Lesson ${lesson.id} of ${lessons.length}`;
  readerBody.innerHTML = renderMarkdown(lesson.content);

  // editor
  codeEditor.value = lesson.starterCode;

  // breadcrumb
  breadcrumbLesson.textContent = `Lesson ${lesson.id}`;

  // sidebar active state
  const buttons = lessonNav.querySelectorAll('button');
  buttons.forEach((btn, i) => {
    btn.removeAttribute('aria-current');
    if (i === index) btn.setAttribute('aria-current', 'page');
  });

  // reset status
  setStatus('info', 'Ready');

  // scroll reader to top
  document.getElementById('readerPanel').scrollTop = 0;

  // close sidebar on mobile
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.remove('open');
}

function setStatus(type, msg) {
  statusBar.dataset.status = type;
  statusText.textContent = msg;
}

// ─── check answer ─────────────────────────────────────────────
function checkAnswer() {
  const lesson = lessons[currentLesson];
  const code = codeEditor.value.trim();
  if (!code) {
    setStatus('error', 'Write some code before checking.');
    return;
  }

  const hasMain  = /\b(auto|int)\s+main\s*\(/.test(code);
  const hasNS    = /using\s+namespace\s+std/.test(code);
  const hasIO    = /#\s*include\s*<iostream>/i.test(code) || /\bcout\b/.test(code) || /\bcin\b/.test(code);

  const checks = [hasMain, hasNS];

  if (lesson.id === 1) {
    checks.push(hasIO);
  } else if (lesson.id === 2) {
    checks.push(hasIO);
  } else if (lesson.id === 3) {
    checks.push(hasIO && (/\bcin\b/.test(code) || /\bgetline\b/.test(code)));
  } else if (lesson.id === 4) {
    checks.push(/\bif\b/.test(code));
  } else if (lesson.id === 5) {
    checks.push(/\b(for|while)\b/.test(code));
  } else if (lesson.id === 6) {
    checks.push(/\bauto\b.*\(/.test(code));
  } else if (lesson.id === 7) {
    checks.push(/\b(array|vector)\b/.test(code));
  } else if (lesson.id === 8 || lesson.id === 9 || lesson.id === 10) {
    checks.push(/\bclass\b/.test(code));
  }

  const passed = checks.every(Boolean);
  const total = checks.length;
  const ok = checks.filter(Boolean).length;

  if (passed) {
    setStatus('success', `All ${total} checks passed — modern C++ style!`);
  } else {
    const hints = [];
    if (!hasMain) hints.push('Missing main() function');
    if (!hasNS) hints.push('Add using namespace std;');
    if (!hasIO) hints.push('Need #include <iostream> or cout');
    setStatus('error', `${ok}/${total} checks passed. ${hints.join('; ')}`);
  }
}

// ─── sidebar toggle (mobile) ──────────────────────────────────
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// ─── init ─────────────────────────────────────────────────────
buildSidebar();
loadLesson(0);
checkBtn.addEventListener('click', checkAnswer);

})();
