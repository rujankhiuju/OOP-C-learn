<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPP Learn — Interactive C++ Course</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

:root {
  --bg-primary: #13161a;
  --bg-secondary: #1a1d23;
  --bg-tertiary: #1e2228;
  --bg-surface: #24282f;
  --bg-hover: #2c3039;
  --bg-active: #333842;
  --border: #2e333d;
  --border-light: #3a404d;
  --text-primary: #e4e7ed;
  --text-secondary: #a8aebb;
  --text-muted: #6b7180;
  --accent: #4fc3f7;
  --accent-dim: #1f6ea0;
  --success: #66bb6a;
  --error: #ef5350;
  --warning: #ffa726;
  --code-bg: #181b20;
  --sidebar-width: 280px;
  --topbar-height: 48px;
  --radius: 8px;
  --radius-sm: 4px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

::selection { background: var(--accent-dim); color: #fff; }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ─── Top Bar ─── */
.topbar {
  height: var(--topbar-height);
  background: #0f1115;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
}
.topbar-logo {
  font-weight: 700;
  font-size: 1rem;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.02em;
}
.topbar-logo svg { display: block; }
.topbar-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
}
.topbar-course-name {
  font-size: 0.82rem;
  color: var(--text-secondary);
  font-weight: 500;
}
.topbar-spacer { flex: 1; }

/* Progress */
.topbar-progress {
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-track {
  width: 120px;
  height: 4px;
  background: var(--bg-surface);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--success);
  border-radius: 2px;
  transition: width 0.4s ease;
}
.progress-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  white-space: nowrap;
}

.topbar-profile {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-dim), #7c4dff);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem; font-weight: 700; color: #fff;
  cursor: default;
}

/* ─── Layout ─── */
.app-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── Sidebar ─── */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-header h3 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  font-weight: 600;
}
.sidebar-header .sidebar-sub {
  font-size: 0.7rem;
  color: var(--text-muted);
  margin-top: 2px;
}
.lesson-nav {
  list-style: none;
  padding: 8px 0;
}
.lesson-nav li { margin: 0; }
.lesson-nav button {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 16px;
  background: none;
  border: none;
  border-left: 3px solid transparent;
  color: var(--text-secondary);
  font-size: 0.82rem;
  font-family: var(--font-sans);
  text-align: left;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, color 0.12s;
}
.lesson-nav button:hover { background: var(--bg-hover); color: var(--text-primary); }
.lesson-nav button:focus-visible { outline-offset: -2px; }
.lesson-nav button[aria-current="page"] {
  background: var(--bg-active);
  border-left-color: var(--accent);
  color: var(--text-primary);
  font-weight: 600;
}
.lesson-nav button.completed .lesson-num {
  background: var(--success);
  color: #fff;
}
.lesson-nav button.completed .lesson-check {
  opacity: 1;
}
.lesson-num {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--bg-surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 600;
  color: var(--text-muted);
  transition: background 0.15s, color 0.15s;
}
.lesson-nav button[aria-current="page"] .lesson-num {
  background: var(--accent-dim);
  color: #fff;
}
.lesson-nav button:hover .lesson-num { background: var(--bg-hover); color: var(--text-secondary); }
.lesson-check {
  margin-left: auto;
  font-size: 0.7rem;
  opacity: 0;
  transition: opacity 0.2s;
  color: var(--success);
}

/* ─── Main Content ─── */
.main-content {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  overflow: hidden;
  min-width: 0;
}

/* ─── Lesson Reader ─── */
.reader-panel {
  overflow-y: auto;
  padding: 28px 32px;
  border-right: 1px solid var(--border);
  background: var(--bg-tertiary);
}
.reader-panel h2 {
  font-size: 1.35rem;
  font-weight: 700;
  margin-bottom: 2px;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}
.reader-panel .lesson-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 20px;
}
.reader-panel .instruction-box {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin: 16px 0;
  border-left: 3px solid var(--accent);
}
.reader-panel .instruction-box p {
  margin-bottom: 0;
}
.reader-panel h3 {
  font-size: 1rem;
  font-weight: 600;
  margin: 20px 0 8px;
  color: var(--text-primary);
}
.reader-panel p {
  line-height: 1.65;
  margin-bottom: 12px;
  color: var(--text-secondary);
  font-size: 0.9rem;
}
.reader-panel pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  overflow-x: auto;
  margin: 12px 0;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  line-height: 1.5;
  color: #d4d4d4;
}
.reader-panel code {
  font-family: var(--font-mono);
  font-size: 0.8rem;
}
.reader-panel p code {
  background: var(--bg-surface);
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  color: #ce91d8;
  font-size: 0.78rem;
}
.reader-panel ul, .reader-panel ol {
  margin: 8px 0 12px 20px;
  color: var(--text-secondary);
  line-height: 1.6;
  font-size: 0.9rem;
}
.reader-panel li { margin-bottom: 3px; }
.reader-panel .keyword  { color: #569cd6; }
.reader-panel .type     { color: #4ec9b0; }
.reader-panel .string   { color: #ce9178; }
.reader-panel .comment  { color: #6a9955; font-style: italic; }
.reader-panel .number   { color: #b5cea8; }
.reader-panel .function { color: #dcdcaa; }
.reader-panel .preproc  { color: #c586c0; }

.reader-panel blockquote {
  border-left: 3px solid var(--accent-dim);
  padding: 8px 14px;
  margin: 12px 0;
  background: var(--bg-surface);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.reader-panel blockquote p {
  margin-bottom: 0;
  font-size: 0.88rem;
}
.reader-panel table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 0.82rem;
}
.reader-panel th, .reader-panel td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}
.reader-panel th {
  background: var(--bg-surface);
  color: var(--text-primary);
  font-weight: 600;
}
.reader-panel td {
  color: var(--text-secondary);
}

.reader-nav {
  display: flex;
  gap: 8px;
  margin-top: 28px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* ─── Editor Panel ─── */
.editor-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-primary);
}
.editor-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 8px;
}
.editor-toolbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.editor-toolbar label {
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.editor-toolbar .file-tab {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-surface);
  padding: 3px 10px;
  border-radius: var(--radius-sm);
  font-size: 0.75rem;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.editor-toolbar .file-tab .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}
.editor-toolbar-actions { display: flex; gap: 6px; }
.btn {
  font-family: var(--font-sans);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  transition: background 0.12s, transform 0.08s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--accent);
  color: #0a0d14;
}
.btn-primary:hover { background: #6fd0fa; }
.btn-primary:focus-visible { outline-color: var(--accent); }
.btn-success {
  background: var(--success);
  color: #0a0d14;
}
.btn-success:hover { filter: brightness(1.15); }
.btn-secondary {
  background: var(--bg-surface);
  color: var(--text-secondary);
  border: 1px solid var(--border-light);
}
.btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

.editor-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.editor-wrapper textarea {
  width: 100%;
  height: 100%;
  padding: 16px 18px;
  padding-left: 56px;
  background: var(--code-bg);
  color: #d4d4d4;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.55;
  border: none;
  resize: none;
  outline: none;
  tab-size: 2;
  white-space: pre;
  overflow-wrap: normal;
  overflow-x: auto;
}
.editor-wrapper textarea::placeholder { color: var(--text-muted); }

/* Line numbers */
.line-numbers {
  position: absolute;
  top: 0;
  left: 0;
  padding: 16px 10px 16px 12px;
  background: var(--code-bg);
  border-right: 1px solid var(--border);
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.55;
  text-align: right;
  user-select: none;
  pointer-events: none;
  overflow: hidden;
  min-width: 44px;
}

/* ─── Terminal/Output ─── */
.terminal-panel {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: #0c0e12;
  transition: height 0.2s ease;
  display: flex;
  flex-direction: column;
}
.terminal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.terminal-header label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  font-weight: 600;
}
.terminal-header-actions { display: flex; gap: 6px; }
.terminal-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: var(--font-sans);
}
.terminal-btn:hover { color: var(--text-secondary); border-color: var(--border-light); }

.terminal-output {
  padding: 10px 16px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  line-height: 1.5;
  overflow-y: auto;
  min-height: 72px;
  max-height: 140px;
  color: var(--text-secondary);
  white-space: pre-wrap;
}
.terminal-output .success-text { color: var(--success); }
.terminal-output .error-text { color: var(--error); }
.terminal-output .info-text { color: var(--text-muted); }
.terminal-output .prompt { color: var(--accent); }
.terminal-cursor {
  display: inline-block;
  width: 6px;
  height: 14px;
  background: var(--accent);
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink { 50% { opacity: 0; } }

/* ─── Sidebar toggle ─── */
.sidebar-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 4px;
  border-radius: var(--radius-sm);
}
.sidebar-toggle:hover { color: var(--text-primary); }

/* ─── Responsive ─── */
@media (max-width: 1024px) {
  .sidebar { width: 220px; }
  .reader-panel { padding: 20px 24px; }
}

@media (max-width: 768px) {
  .sidebar-toggle { display: block; }
  .app-layout { flex-direction: column; }
  .sidebar {
    width: 100%;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .sidebar.open { max-height: 340px; overflow-y: auto; }
  .lesson-nav button { padding: 7px 14px; }

  .main-content {
    grid-template-columns: 1fr;
    overflow: visible;
  }
  .reader-panel {
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 16px 18px;
    max-height: 45vh;
  }
  .editor-panel { min-height: 35vh; }
  .terminal-output { max-height: 100px; min-height: 56px; }
  .topbar { padding: 0 10px; gap: 8px; }
  .topbar-divider, .topbar-course-name { display: none; }
  .progress-track { width: 80px; }
}

@media (max-width: 480px) {
  :root { --sidebar-width: 100%; }
  .reader-panel { max-height: 40vh; padding: 14px; }
  .editor-wrapper textarea { padding-left: 44px; font-size: 0.75rem; }
  .line-numbers { font-size: 0.75rem; min-width: 34px; padding: 16px 6px 16px 8px; }
}
</style>
</head>
<body>

<header class="topbar" role="banner">
  <button class="sidebar-toggle" aria-label="Toggle lesson list" id="sidebarToggle" type="button">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/></svg>
  </button>
  <div class="topbar-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    CPP Learn
  </div>
  <div class="topbar-divider"></div>
  <span class="topbar-course-name">C++ Fundamentals</span>
  <div class="topbar-spacer"></div>
  <div class="topbar-progress">
    <span class="progress-label" id="progressLabel">1/10</span>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:10%"></div>
    </div>
  </div>
  <div class="topbar-profile" aria-label="User avatar" role="img">JD</div>
</header>

<div class="app-layout">

  <aside class="sidebar" id="sidebar" aria-label="Lesson navigation">
    <div class="sidebar-header">
      <h3>Course Content</h3>
      <div class="sidebar-sub">10 lessons</div>
    </div>
    <nav aria-label="Lesson list">
      <ul class="lesson-nav" id="lessonNav" role="list"></ul>
    </nav>
  </aside>

  <main class="main-content" id="mainContent">

    <!-- Reader -->
    <section class="reader-panel" id="readerPanel" aria-label="Lesson content">
      <h2 id="readerTitle">Introduction to Modern C++</h2>
      <div class="lesson-meta" id="readerMeta">Lesson 1 of 10</div>
      <div id="readerBody"></div>
      <div class="reader-nav">
        <button class="btn btn-secondary" id="prevBtn" type="button">Back</button>
        <button class="btn btn-primary" id="nextBtn" type="button">Next</button>
      </div>
    </section>

    <!-- Editor -->
    <section class="editor-panel" aria-label="Code editor">
      <div class="editor-toolbar">
        <div class="editor-toolbar-left">
          <span class="file-tab"><span class="dot"></span> main.cpp</span>
        </div>
        <div class="editor-toolbar-actions">
          <button class="btn btn-secondary" id="resetBtn" type="button">Reset</button>
          <button class="btn btn-primary" id="runBtn" type="button">&#9654; Run</button>
          <button class="btn btn-success" id="checkBtn" type="button">Check Answer</button>
        </div>
      </div>
      <div class="editor-wrapper">
        <div class="line-numbers" id="lineNumbers" aria-hidden="true">1</div>
        <textarea
          id="codeEditor"
          spellcheck="false"
          autocomplete="off"
          aria-label="C++ code editor"
          placeholder="// Write your C++ code here"
        ></textarea>
      </div>

      <!-- Terminal / Output -->
      <div class="terminal-panel" id="terminalPanel">
        <div class="terminal-header">
          <label>Output</label>
          <div class="terminal-header-actions">
            <button class="terminal-btn" id="clearTerminalBtn" type="button">Clear</button>
          </div>
        </div>
        <div class="terminal-output" id="terminalOutput" role="log" aria-live="polite">
          <span class="prompt">$</span> g++ main.cpp -o main<br>
          <span class="info-text">Ready to compile.</span><span class="terminal-cursor"></span>
        </div>
      </div>
    </section>

  </main>
</div>

<script>
(function() {
'use strict';

const lessons = [
  {
    id: 1,
    title: "Hello, World!",
    content: `## Hello, World!

Let's write your first C++ program! Every C++ program needs a \`main()\` function — that's where the program starts running.

<div class="instruction-box">
<p><strong>Instructions:</strong> Write a program that prints <code>"Hello, World!"</code> to the console.</p>
</div>

### Code Explanation

\`\`\`cpp
#include <iostream>
using namespace std;

auto main() -> int {
    cout << "Hello, World!\\n";
}
\`\`\`

- <code class="keyword">#include &lt;iostream&gt;</code> — lets you use input/output
- <code class="keyword">using namespace std;</code> — use names like <code class="keyword">cout</code> directly
- <code class="keyword">auto main() -> int</code> — the program entry point (modern C++ style)
- <code class="keyword">cout &lt;&lt; "..."</code> — prints text to the screen
- <code class="keyword">\\n</code> — adds a newline (faster than \`endl\`)

> 💡 **Tip:** Click **Run** to see the output, then **Check Answer** to verify your code.`,

    starterCode: `#include <iostream>\nusing namespace std;\n\nauto main() -> int {\n    cout << "Hello, World!\\n";\n}`
  },
  {
    id: 2,
    title: "Variables & Auto",
    content: `## Storing Data

Variables let you store information. Modern C++ uses \`auto\` to figure out the type automatically.

<div class="instruction-box">
<p><strong>Instructions:</strong> Create a variable <code>name</code> and <code>age</code>, then print them.</p>
</div>

### Examples

\`\`\`cpp
auto year = 2026;        // int
auto price = 19.99;      // double
auto greeting = "Hi"s;   // string (s suffix)
\`\`\`

### Type Table

| Code                     | Type     |
|--------------------------|----------|
| \`auto x = 42\`            | \`int\`     |
| \`auto y = 3.14\`          | \`double\`  |
| \`auto z = "hello"s\`      | \`string\`  |
| \`auto b = true\`          | \`bool\`    |

> 💡 The \`s\` suffix after a string literal makes it \`std::string\`.`,

    starterCode: `#include <iostream>\n#include <string>\nusing namespace std;\n\nauto main() -> int {\n    auto name = "Learner"s;\n    auto age = 20;\n    cout << "My name is " << name << " and I am " << age << " years old.\\n";\n}`
  },
  {
    id: 3,
    title: "Input & Output",
    content: `## Reading User Input

Use \`cin\` to read input from the keyboard. For text with spaces, use \`getline\`.

<div class="instruction-box">
<p><strong>Instructions:</strong> Ask for the user's name, then greet them.</p>
</div>

### Example

\`\`\`cpp
#include <iostream>
#include <string>
using namespace std;

auto main() -> int {

// ─── Helpers ──────────────────────────────────────────────────

function highlightCode(code) {
  const escapes = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'};
  let s = code.replace(/[&<>"]/g, c => escapes[c]);
  const rules = [
    [/\/\/.*$/gm, '<span class="comment">$&</span>'],
    [/#\w+\b/g, '<span class="preproc">$&</span>'],
    [/\b(auto|break|case|catch|class|const|constexpr|continue|default|delete|do|else|enum|explicit|export|extern|false|final|for|friend|goto|if|include|inline|mutable|namespace|new|nullptr|operator|override|private|protected|public|register|return|sizeof|static|struct|switch|template|this|throw|true|try|typedef|typeid|typename|union|using|virtual|void|volatile|while)\b/g, '<span class="keyword">$&</span>'],
    [/\b(int|bool|char|double|float|long|short|signed|unsigned|string|string_view|size_t|void)\b/g, '<span class="type">$&</span>'],
    [/"([^"\\]|\\.)*"/g, '<span class="string">$&</span>'],
    [/'([^'\\]|\\.)'/g, '<span class="string">$&</span>'],
    [/\b(\d+\.?\d*)\b/g, '<span class="number">$&</span>'],
    [/\b([a-zA-Z_]\w*)\s*\(/g, '<span class="function">$1</span>(']
  ];
  for (const [re, repl] of rules) s = s.replace(re, repl);
  return s;
}

function renderMarkdown(text) {
  let html = text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>');

  html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
    return '<pre>' + highlightCode(code.trimEnd()) + '</pre>';
  });

  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  html = html.replace(/\|(.+)\|[\s\S]*?\|(.+)\|/g, (match) => {
    const rows = match.trim().split('\n');
    const header = rows[0].split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    let body = '';
    for (let i = 2; i < rows.length; i++) {
      const cells = rows[i].split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      if (cells) body += `<tr>${cells}</tr>`;
    }
    return `<table><thead><tr>${header}</tr></thead><tbody>${body}</tbody></table>`;
  });

  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<\/p><p><h([23])>/g, '<h$1>');
  html = html.replace(/<\/h([23])><p>/g, '</h$1>');
  html = html.replace(/<p><ul>/g, '<ul>');
  html = html.replace(/<\/ul><p>/g, '</ul>');
  html = html.replace(/<p><blockquote>/g, '<blockquote>');
  html = html.replace(/<\/blockquote><p>/g, '</blockquote>');
  html = html.replace(/<p><table>/g, '<table>');
  html = html.replace(/<\/table><p>/g, '</table>');
  html = html.replace(/<div class="instruction-box"><p><\/p>/g, '<div class="instruction-box">');
  html = html.replace(/<p>\s*<\/p>/g, '');

  // Keep instruction-box divs intact
  html = html.replace(/<p><div class="instruction-box">/g, '<div class="instruction-box">');
  html = html.replace(/<\/div><\/p>/g, '</div>');

  return html;
}

// ─── State ────────────────────────────────────────────────────
let currentLesson = 0;
let completedLessons = new Set();

const lessonNav    = document.getElementById('lessonNav');
const readerTitle  = document.getElementById('readerTitle');
const readerMeta   = document.getElementById('readerMeta');
const readerBody   = document.getElementById('readerBody');
const codeEditor   = document.getElementById('codeEditor');
const lineNumbers  = document.getElementById('lineNumbers');
const terminalOut  = document.getElementById('terminalOutput');
const checkBtn     = document.getElementById('checkBtn');
const runBtn       = document.getElementById('runBtn');
const resetBtn     = document.getElementById('resetBtn');
const prevBtn      = document.getElementById('prevBtn');
const nextBtn      = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const progressLabel= document.getElementById('progressLabel');

// ─── Line numbers ─────────────────────────────────────────────
function updateLineNumbers() {
  const lines = codeEditor.value.split('\n');
  const nums = lines.map((_, i) => i + 1).join('\n');
  lineNumbers.textContent = nums;
}

codeEditor.addEventListener('input', updateLineNumbers);
codeEditor.addEventListener('scroll', () => {
  lineNumbers.scrollTop = codeEditor.scrollTop;
});

// ─── Terminal ─────────────────────────────────────────────────
function writeTerminal(lines) {
  let html = '';
  for (const line of lines) {
    if (typeof line === 'object') {
      html += `<span class="${line.class}">${line.text}</span>`;
    } else {
      html += line;
    }
    html += '<br>';
  }
  terminalOut.innerHTML = html + '<span class="terminal-cursor"></span>';
  terminalOut.scrollTop = terminalOut.scrollHeight;
}

function clearTerminal() {
  writeTerminal([
    '<span class="prompt">$</span> g++ main.cpp -o main',
    '<span class="info-text">Ready to compile.</span>'
  ]);
}

document.getElementById('clearTerminalBtn').addEventListener('click', clearTerminal);

// ─── Sidebar ──────────────────────────────────────────────────
function buildSidebar() {
  lessons.forEach((l, i) => {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.setAttribute('data-index', i);
    btn.innerHTML = `<span class="lesson-num">${l.id}</span> ${l.title}<span class="lesson-check">&#10003;</span>`;
    btn.addEventListener('click', () => loadLesson(i));
    li.appendChild(btn);
    lessonNav.appendChild(li);
  });
}

function updateSidebar() {
  const buttons = lessonNav.querySelectorAll('button');
  buttons.forEach((btn, i) => {
    btn.removeAttribute('aria-current');
    if (i === currentLesson) btn.setAttribute('aria-current', 'page');
    btn.classList.toggle('completed', completedLessons.has(i));
  });
}

// ─── Load lesson ──────────────────────────────────────────────
function loadLesson(index) {
  currentLesson = index;
  const lesson = lessons[index];

  readerTitle.textContent = lesson.title;
  readerMeta.textContent = `Lesson ${lesson.id} of ${lessons.length}`;
  readerBody.innerHTML = renderMarkdown(lesson.content);

  codeEditor.value = lesson.starterCode;
  updateLineNumbers();

  // Update progress
  const pct = Math.round(((index + 1) / lessons.length) * 100);
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${index + 1}/${lessons.length}`;

  updateSidebar();
  clearTerminal();

  document.getElementById('readerPanel').scrollTop = 0;

  const sidebar = document.getElementById('sidebar');
  sidebar.classList.remove('open');

  // Enable/disable nav buttons
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === lessons.length - 1;
}

// ─── Run ──────────────────────────────────────────────────────
function runCode() {
  const code = codeEditor.value.trim();
  if (!code) {
    writeTerminal([
      '<span class="prompt">$</span> g++ main.cpp -o main',
      '<span class="error-text">error: empty source file</span>'
    ]);
    return;
  }

  const hasMain = /\b(auto|int)\s+main\s*\(/.test(code);
  if (!hasMain) {
    writeTerminal([
      '<span class="prompt">$</span> g++ main.cpp -o main',
      '<span class="error-text">error: no main() function found</span>'
    ]);
    return;
  }

  writeTerminal([
    '<span class="prompt">$</span> g++ main.cpp -o main',
    '<span class="success-text">Compilation successful.</span>',
    '<span class="prompt">$</span> ./main',
    'Hello, World!',
    ''
  ]);
}

// ─── Check answer ─────────────────────────────────────────────
function checkAnswer() {
  const lesson = lessons[currentLesson];
  const code = codeEditor.value.trim();
  if (!code) {
    writeTerminal([
      '<span class="prompt">$</span> check answer',
      '<span class="error-text">Write some code before checking.</span>'
    ]);
    return;
  }

  const hasMain = /\b(auto|int)\s+main\s*\(/.test(code);
  const hasNS   = /using\s+namespace\s+std/.test(code);
  const hasIO   = /#\s*include\s*<iostream>/i.test(code) || /\bcout\b/.test(code) || /\bcin\b/.test(code);

  const checks = [hasMain, hasNS];

  if (lesson.id === 1) {
    checks.push(hasIO);
  } else if (lesson.id === 2) {
    checks.push(hasIO);
  } else if (lesson.id === 3) {
    checks.push(hasIO && (/\bcin\b/.test(code) || /\bgetline\b/.test(code)));
  } else if (lesson.id === 4) {
    checks.push(/\bif\b/.test(code));
  } else if (lesson.id === 5) {
    checks.push(/\b(for|while)\b/.test(code));
  } else if (lesson.id === 6) {
    checks.push(/\bauto\b.*\(/.test(code));
  } else if (lesson.id === 7) {
    checks.push(/\b(array|vector)\b/.test(code));
  } else if (lesson.id === 8 || lesson.id === 9 || lesson.id === 10) {
    checks.push(/\bclass\b/.test(code));
  }

  const passed = checks.every(Boolean);
  const total = checks.length;
  const ok = checks.filter(Boolean).length;

  if (passed) {
    writeTerminal([
      '<span class="prompt">$</span> check answer',
      '<span class="success-text">✓ All ' + total + ' checks passed! Great work!</span>'
    ]);
    completedLessons.add(currentLesson);
    updateSidebar();
  } else {
    const hints = [];
    if (!hasMain) hints.push('Missing main() function');
    if (!hasNS) hints.push('Add using namespace std;');
    if (!hasIO) hints.push('Need #include <iostream> or cout');
    writeTerminal([
      '<span class="prompt">$</span> check answer',
      '<span class="error-text">✗ ' + ok + '/' + total + ' checks passed.</span>',
      '<span class="error-text">' + hints.join('; ') + '</span>'
    ]);
  }
}

// ─── Reset ────────────────────────────────────────────────────
function resetCode() {
  const lesson = lessons[currentLesson];
  codeEditor.value = lesson.starterCode;
  updateLineNumbers();
  clearTerminal();
}

// ─── Keyboard shortcuts ───────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runCode();
  }
});

// ─── Init ─────────────────────────────────────────────────────
buildSidebar();
loadLesson(0);
prevBtn.addEventListener('click', () => loadLesson(Math.max(0, currentLesson - 1)));
nextBtn.addEventListener('click', () => loadLesson(Math.min(lessons.length - 1, currentLesson + 1)));
runBtn.addEventListener('click', runCode);
checkBtn.addEventListener('click', checkAnswer);
resetBtn.addEventListener('click', resetCode);
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

})();
</script>
